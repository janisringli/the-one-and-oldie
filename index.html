<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/favicon_io/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/favicon_io/favicon.ico"
    />
    <link rel="manifest" href="./assets/favicon_io/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <title>The One & Oldie | Vintage Chevy mieten</title>
    <meta
      name="description"
      content="The One & Oldie – Vintage Chevy Truck für Hochzeiten, Geburtstage und besondere Anlässe."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/site.css" />
    <link rel="stylesheet" href="./assets/loader.css" />
    <link rel="stylesheet" href="./assets/nav.css" />
    <style>
      .btn,
      .footer a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s ease;
      }

      .btn:hover,
      .btn:focus-visible,
      .footer a:hover,
      .footer a:focus-visible {
        border-color: rgba(34, 34, 34, 0.4);
        outline: none;
      }

      .hero {
        text-align: center;
        padding-top: clamp(2rem, 7vw, 4.2rem);
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.9rem, 5vw, 3rem);
        font-weight: 400;
        letter-spacing: 0.09em;
      }

      .hero p {
        margin: 1rem auto 0;
        max-width: 42ch;
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        line-height: 1.8;
      }

      .hero-image {
        margin: clamp(1.7rem, 4vw, 2.8rem) auto 0;
        width: min(760px, 100%);
        border: 1px solid var(--line);
        background: #f7f7f7;
        overflow: hidden;
      }

      .hero-image img {
        display: block;
        width: 100%;
        height: auto;
      }

      .section {
        margin-top: clamp(2.5rem, 6vw, 4.2rem);
      }

      .section h2 {
        margin: 0 0 1rem;
        text-transform: uppercase;
        letter-spacing: 0.11em;
        font-size: clamp(0.95rem, 2.2vw, 1.08rem);
        font-weight: 400;
      }

      .events {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
      }

      .event-card {
        border: 1px solid var(--line);
        padding: 0.85rem 0.75rem;
        text-align: center;
        font-size: 0.9rem;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
      }

      .gallery img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border: 1px solid var(--line);
        display: block;
      }

      .cta {
        margin-top: clamp(2.4rem, 6vw, 3.8rem);
        text-align: center;
        border-top: 1px solid var(--line);
        padding-top: clamp(1.2rem, 3vw, 1.8rem);
      }

      .btn {
        display: inline-block;
        font-size: 0.95rem;
        padding-bottom: 0.1rem;
      }

      .footer {
        margin-top: 2.4rem;
        text-align: center;
        font-size: 0.85rem;
        opacity: 0.9;
      }

      @media (max-width: 820px) {
        .events,
        .gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 580px) {
        .events,
        .gallery {
          grid-template-columns: 1fr;
        }

        .hero {
          text-align: left;
        }

        .hero p {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="page-loader" class="page-loader" aria-live="polite" aria-busy="true">
      <div class="loader-half loader-half--top" aria-hidden="true"></div>
      <div class="loader-half loader-half--bottom" aria-hidden="true"></div>
      <div class="loader-scene">
        <p class="loader-label">The One &amp; Oldie</p>
        <div
          class="dino-game"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="Seite wird geladen"
        >
          <canvas class="dino-canvas" aria-hidden="true"></canvas>
          <img
            class="loader-runner"
            src="./assets/logo.png"
            alt=""
            width="72"
            height="72"
            decoding="async"
          />
        </div>
      </div>
    </div>

    <div class="site">
      <header class="nav">
        <div class="brand-wrap">
          <img
            class="brand-logo"
            src="./assets/logo.png"
            alt="The One &amp; Oldie Logo"
          />
          <p class="brand">The One &amp; Oldie</p>
        </div>
        <div class="nav-menu">
          <button
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="nav-menu"
            aria-label="Menü öffnen"
          >
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
          </button>
          <nav id="nav-menu" class="nav-links" aria-label="Hauptnavigation">
            <a href="index.html" aria-current="page">Start</a>
            <a href="contact.html">Kontakt</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero" aria-label="Startbereich">
          <h1>The One &amp; Oldie</h1>
          <p>Fahrten für Hochzeiten, Geburtstage usw.</p>
        </section>

        <section class="section" aria-label="Anlässe">
          <h2>Ideal für</h2>
          <div class="events">
            <div class="event-card">Hochzeiten</div>
            <div class="event-card">Geburtstage</div>
            <div class="event-card">Fotoshootings</div>
          </div>
        </section>

        <section class="section" aria-label="Galerie">
          <h2>Galerie (Beispielbilder)</h2>
          <div class="gallery">
            <img
              src="./assets/gallery/example1.jpg"
              alt="Beispielbild 1 für späteres Ersetzen"
            />
            <img
              src="./assets/gallery/example2.jpg"
              alt="Beispielbild 2 für späteres Ersetzen"
            />
            <img
              src="./assets/gallery/example3.jpg"
              alt="Beispielbild 3 für späteres Ersetzen"
            />
          </div>
        </section>

        <section class="cta" aria-label="Kontaktaufruf">
          <p>Direkt anfragen und Verfügbarkeit persönlich besprechen.</p>
          <a class="btn" href="contact.html">Zur Kontaktseite</a>
        </section>
      </main>

      <footer class="footer">
        <a href="contact.html">Kontakt</a>
      </footer>
    </div>
    <script src="./assets/loader.js"></script>
    <script src="./assets/nav.js"></script>
  </body>
</html>
